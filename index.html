<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phaser 3 Engine Prototype</title>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    canvas {
      background-color: white;
      border: 2px solid white;
    }
  </style>
</head>
<body>
  <script>
    function preload() {

    }

    function create() {

      this.spawnEnemy = spawnEnemy.bind(this);
      this.hitEnemy = hitEnemy.bind(this);
      this.hitPlayer = hitPlayer.bind(this);
      this.createParticles = createParticles.bind(this);
      this.drawUI = drawUI.bind(this);
      this.showGameOverScreen = showGameOverScreen.bind(this);

      const g = this.add.graphics();

      g.fillStyle(0xffff00, 1);
      g.fillRect(0, 0, 30, 30);
      g.generateTexture('playerSquare', 30, 30);
      g.clear();

      g.fillStyle(0xff0000, 1);
      g.fillCircle(5, 5, 5);
      g.generateTexture('bullet', 10, 10);
      g.clear();

      g.fillStyle(0x0000ff, 1);
      g.fillRect(0, 0, 25, 25);
      g.generateTexture('blueEnemy', 25, 25);
      g.clear();

      g.fillStyle(0x800080, 1);
      g.fillRect(0, 0, 45, 45);
      g.generateTexture('purpleBrute', 45, 45);
      g.clear();

      g.destroy();

      this.player = this.physics.add.sprite(400, 300, 'playerSquare');
      this.player.body.setCollideWorldBounds(true);

      this.playerHealth = 100;
      this.playerMaxHealth = 100;
      this.lastDamageTime = 0;
      this.damageCooldown = 500;
      this.playerSpeed = 300;

      this.projectiles = this.physics.add.group();
      this.enemies = this.physics.add.group();

      this.particles = this.add.group();

      this.fireRate = 300;
      this.nextFire = 0;
      this.score = 0;
      this.isGameOver = false;

      this.spawnerEvent = this.time.addEvent({
        delay: 1500,
        callback: this.spawnEnemy,
        callbackScope: this,
        loop: true,
      });

      this.cursors = this.input.keyboard.addKeys({
        up: Phaser.Input.Keyboard.KeyCodes.W,
        down: Phaser.Input.Keyboard.KeyCodes.S,
        left: Phaser.Input.Keyboard.KeyCodes.A,
        right: Phaser.Input.Keyboard.KeyCodes.D
      });

      this.physics.add.overlap(this.projectiles, this.enemies, this.hitEnemy, null, this);

      this.physics.add.overlap(this.player, this.enemies, this.hitPlayer, null, this);

      this.scoreText = this.add.text(20, 20, 'Score: 0', {
        fontFamily: 'sans-serif',
        fontSize: '24px',
        fill: '#ffa500',
      });

      this.uiGraphics = this.add.graphics();
    }

    function update() {
      if (this.isGameOver) return;

      this.player.body.setVelocity(0);

      if (this.cursors.left.isDown) {
        this.player.body.setVelocityX(-this.playerSpeed);
      } else if (this.cursors.right.isDown) {
        this.player.body.setVelocityX(this.playerSpeed);
      }

      if (this.cursors.up.isDown) {
        this.player.body.setVelocityY(-this.playerSpeed);
      } else if (this.cursors.down.isDown) {
        this.player.body.setVelocityY(this.playerSpeed);
      }

      const pointer = this.input.activePointer;

      if (pointer.isDown && this.time.now > this.nextFire) {
        const angle = Phaser.Math.Angle.Between(this.player.x, this.player.y, pointer.x, pointer.y);

        const bullet = this.projectiles.create(this.player.x, this.player.y, 'bullet');

        const bulletSpeed = 600;
        bullet.body.setVelocity(
          Math.cos(angle) * bulletSpeed,
          Math.sin(angle) * bulletSpeed
        );

        this.nextFire = this.time.now + this.fireRate;
      }

      this.enemies.getChildren().forEach(enemy => {
        const angle = Phaser.Math.Angle.Between(enemy.x, enemy.y, this.player.x, this.player.y);

        enemy.body.setVelocity(
          Math.cos(angle) * enemy.speedValue + enemy.kbX,
          Math.sin(angle) * enemy.speedValue + enemy.kbY
        )

        if (Math.abs(enemy.kbX) < 1) {
          enemy.kbX = 0
        } else {
          enemy.kbX *= 0.85;
        }

        if (Math.abs(enemy.kbY) < 1) {
          enemy.kbY = 0
        } else {
          enemy.kbY *= 0.85;
        }
      });

      this.projectiles.getChildren().forEach(bullet => {
        if (bullet.x < 0 || bullet.x > 800 || bullet.y < 0 || bullet.y > 800) {
          bullet.destroy();
        }
      });

      this.drawUI();
    }

    function spawnEnemy() {
      if (this.isGameOver) return;

      let rx, ry;
      let dist = 0;
      const safeRadius = 400;

      do {
        rx = Phaser.Math.Between(50, 750);
        ry = Phaser.Math.Between(50, 750);
        dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, rx, ry);
      } while (dist < safeRadius);

      const isBrute = Math.random() < 0.3;
      const key = isBrute ? 'purpleBrute' : 'blueEnemy';

      const enemy = this.enemies.create(rx, ry, key);

      enemy.health = isBrute ? 6 : 3;
      enemy.maxHealth = isBrute ? 6 : 3;
      enemy.speedValue = isBrute ? 80 : 200;
      enemy.colorValue = isBrute ? 0x800080 : 0x0000ff;
      enemy.scoreValue = isBrute ? 30 : 10;

      enemy.kbX = 0;
      enemy.kbY = 0;
    }

    function hitEnemy(bullet, enemy) {
      bullet.destroy();
      enemy.health -= 1;

      this.createParticles(bullet.x, bullet.y, 0xffffff, 5);

      if (enemy.health <= 0) {
        this.createParticles(enemy.x, enemy.y, enemy.colorValue, 20);
        enemy.destroy();

        this.score += enemy.scoreValue;
        this.scoreText.setText('Score: ' + this.score);
      }
    }

    function hitPlayer(player, enemy) {
      const currentTime = this.time.now;

      if (currentTime - this.lastDamageTime > this.damageCooldown) {
        this.playerHealth -= 10;
        this.lastDamageTime = currentTime;

        this.cameras.main.flash(100, 255, 255, 0);

        const knockbackRadius = 250;
        const knockBackStrength = 400;

        this.enemies.getChildren().forEach(currEnemy => {
          const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, currEnemy.x, currEnemy.y);

          if (dist <= knockbackRadius) {
            const pushAngle = Phaser.Math.Angle.Between(this.player.x, this.player.y, currEnemy.x, currEnemy.y);

            currEnemy.kbX = Math.cos(pushAngle) * knockBackStrength;
            currEnemy.kbY = Math.sin(pushAngle) * knockBackStrength;
          }
        });

        if (this.playerHealth <= 0) {
          this.playerHealth = 0;
          this.isGameOver = true;
          this.showGameOverScreen();
        }
      }
    }

    function createParticles(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        const p = this.add.rectangle(x, y, 4, 4, color);
        this.physics.add.existing(p);

        p.body.setVelocity(
          Phaser.Math.FloatBetween(-150, 150),
          Phaser.Math.FloatBetween(-150, 150)
        );

        this.tweens.add({
          targets: p,
          alpha: 0,
          duration: 500,
          onComplete: () => {
            p.destroy();
          }
        });
      }
    }

    function drawUI() {
      this.uiGraphics.clear();

      const barX = 20;
      const barY = 55;
      const barWidth = 200;
      const barHeigth = 20;

      this.uiGraphics.fillStyle(0x323232, 0.5);
      this.uiGraphics.fillRect(barX, barY, barWidth, barHeigth);

      if (this.time.now - this.lastDamageTime < this.damageCooldown) {
        this.uiGraphics.fillStyle(0xffff00, 1);
      } else {
        this.uiGraphics.fillStyle(0xff0000, 1);;
      }

      const hpPercentage = this.playerHealth / this.playerMaxHealth;
      this.uiGraphics.fillRect(barX, barY, barWidth * hpPercentage, barHeigth);

      this.uiGraphics.lineStyle(2, 0xffa500, 1);
      this.uiGraphics.strokeRect(barX, barY, barWidth, barHeigth);

      this.enemies.getChildren().forEach(currEnemy => {
        if (currEnemy.health < currEnemy.maxHealth) {
          const enemyHpY = currEnemy.y - (currEnemy.height / 2) - 8;
          const hpBarWidth = currEnemy.width;
          const hpBarHeight = 4;

          this.uiGraphics.fillStyle(0xff0000, 1);
          this.uiGraphics.fillRect(currEnemy.x - currEnemy.width / 2, enemyHpY, hpBarWidth, hpBarHeight);

          this.uiGraphics.fillStyle(0x00ff00, 1);
          const percent = currEnemy.health / currEnemy.maxHealth;
          this.uiGraphics.fillRect(currEnemy.x - currEnemy.width / 2, enemyHpY, hpBarWidth * percent, hpBarHeight);
        }
      });
    }

    function showGameOverScreen() {
      this.spawnerEvent.destroy();
      this.player.body.setVelocity(0);
      this.enemies.setVelocity(0);

      const overlay = this.add.rectangle(400, 300, 800, 800, 0x000000, 0.7);

      this.add.text(400, 220, 'Game Over', {
        fontFamily: 'sans-serif',
        fontSize: '48px',
        fill: '#ffffff'
      }).setOrigin(0.5);

      this.add.text(400, 280, 'Final Score: ' + this.score, {
        fontFamily: 'sans-serif',
        fontSize: '24px',
        fill: '#ffffff'
      }).setOrigin(0.5);

      const restartText = this.add.text(400, 340, 'Click anywhere to restart', {
        fontFamily: 'sans-serif',
        fontSize: '20px',
        fill: '#ffa500',
      }).setOrigin(0.5);

      this.tweens.add({
        targets: restartText,
        alpha: 0.3,
        duration: 800,
        yoyo: true,
        loop: -1,
      });

      this.input.once('pointerdown', () => {
        this.scene.restart();
      });
    }



    const config = {
      type: Phaser.CANVAS,
      width: 800,
      height: 800,
      physics: {
        default: 'arcade',
        arcade: {
          debug: false,
        }
      },
      scene: {
        preload: preload,
        create: create,
        update: update,

        spawnEnemy: spawnEnemy,
        hitEnemy: hitEnemy,
        hitPlayer: hitPlayer,
        createParticles: createParticles,
        drawUI: drawUI,
        showGameOverScreen: showGameOverScreen
      }
    }

    const game = new Phaser.Game(config);
  </script>
</body>
</html>
